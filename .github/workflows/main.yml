# PortfolioBlazorWasm
name: Deploy to GitHub Pages

# Run Workflow on every push to master branch
on:
  push:
    branches: [ main ]

jobs:
  deploy-to-github-pages:
  # use ubuntu-latest image to run steps on
    runs-on: ubuntu-latest
    steps:
    # uses github's checkout to checkout code from the main branch
    - uses: actions/checkout@v2
    
    # sets up .Net Core SDK 6.0
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 6.0.x
    
    # Publishing Project
    - name: Publish .Net Core Project
      run: dotnet publish PortfolioAndBlog.csproj -c Release -o release --nologo
      
    # Changes the base tag in index.html from ‘/’ to ‘BlazorGitHubPagesDemo’ to match the GitHub Pages repository subdirectory
    - name: Chnage base-tag in index.html to PortfolioAndBlog
      run: sed -i ‘s/<base href=”\/” \/>/<base href=”\/BlazorGitHubPagesDemo\/” \/>/g’ release/wwwroot/index.html
      
    #  Copy index.html to 404.html to serve the same file when a file is not found
    - name: copy index.html to 404.html
      run: cp release/wwwroot/index.html release/wwwroot/404.html
    
    - name: Commit wwroot to Github Pages
      uses: JamesIves/github-pages-deploy-action@3.7.1
      with:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN }}
        BRANCH: gh-pages
        FOLDER: release/wwwroot
